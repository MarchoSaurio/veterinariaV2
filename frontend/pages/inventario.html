<!DOCTYPE html>
<html>
<head>
    <title>Inventario</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input, select, button { margin: 4px 0; padding: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        th { background: #f0f0f0; }
        .actions button { margin-right: 4px; font-size: 12px; }
        .status { margin-top: 8px; color: #333; }
        .tabs { margin: 20px 0; }
        .tab-btn { padding: 10px 15px; margin-right: 5px; cursor: pointer; background: #ddd; border: none; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .inactivo { opacity: 0.6; }
    </style>
</head>
<body>

<h2>Inventario</h2>

<div class="tabs">
    <button class="tab-btn active" onclick="mostrarTab('activos', event)">Productos Activos</button>
    <button class="tab-btn" onclick="mostrarTab('inactivos', event)">Productos Inactivos</button>
</div>

<div id="activos" class="tab-content active">
    <div>
        <label>Buscar:</label><br>
        <input id="filtroBusqueda" placeholder="Nombre o código" style="width: 220px;">
        <select id="filtroTipo" style="width: 140px;">
            <option value="">Todos los tipos</option>
        </select>
        <label><input id="filtroStockBajo" type="checkbox"> Stock bajo</label>
        <button onclick="buscarProductos()">Buscar</button>
        <button onclick="limpiarFiltros()">Limpiar</button>
    </div>

    <hr>

    <div>
        <h3 id="formTitle">Agregar producto</h3>
        <input id="nombre" placeholder="Nombre" style="width: 220px;"><br>
        <input id="codigo" placeholder="Código de barras" style="width: 220px;"><br>
        <input id="precio" placeholder="Precio" type="number" step="0.01" style="width: 220px;"><br>
        <input id="precioCosto" placeholder="Precio costo" type="number" step="0.01" style="width: 220px;"><br>
        <input id="stock" placeholder="Stock" type="number" style="width: 220px;"><br>
        <input id="stockMinimo" placeholder="Stock mínimo" type="number" style="width: 220px;"><br>
        <select id="tipo" style="width: 220px;">
            <option value="">Seleccionar tipo</option>
            <option value="medicamento">Medicamento</option>
            <option value="alimento">Alimento</option>
            <option value="accesorio">Accesorio</option>
            <option value="higiene">Higiene</option>
            <option value="juguete">Juguete</option>
            <option value="suplemento">Suplemento</option>
            <option value="otro">Otro</option>
        </select><br>
        <button id="guardarBtn" onclick="guardarProducto()">Agregar</button>
        <button onclick="cancelarEdicion()" type="button">Cancelar</button>
        <div class="status" id="mensaje"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Código</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Stock mínimo</th>
                <th>Tipo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="lista"></tbody>
    </table>
</div>

<div id="inactivos" class="tab-content">
    <h3>Productos Dados de Baja</h3>
    <button onclick="cargarInactivos()">Refrescar</button>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Código</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Tipo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="listaInactivos"></tbody>
    </table>
</div>

<script src="../js/inventario.js"></script>

</body>
</html>
